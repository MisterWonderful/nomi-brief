version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://nomi:nomibrief2026@postgres:5432/nomibrief?schema=public
      - OPENCLAW_URL=http://host.docker.internal:18789
      - JWT_SECRET=nomi-brief-secret-key-2026
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
      - VOICE_ENABLED=true
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - nomi-brief-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=nomi
      - POSTGRES_PASSWORD=nomibrief2026
      - POSTGRES_DB=nomibrief
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - nomi-brief-network

volumes:
  postgres_data:

networks:
  nomi-brief-network:
    driver: bridge
